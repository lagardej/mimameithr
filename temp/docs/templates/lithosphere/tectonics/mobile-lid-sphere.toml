["plate.geometry"]
# Number of tectonic plates seeded at simulation start.
# Range: 1–10. Earth: 5.
# Low: a few large, continent-spanning plates.
# High: a fragmented mosaic of smaller plates.
count = 0

# Size distribution of plates.
# Range: 1–10. Earth: 8.
# Low: all plates roughly equal in size.
# High: a few dominant plates and many small fragments.
distribution = 0

["plate.regime"]
# Rate at which plates reorganize: split, merge, or change direction over time.
# Range: 1–10. Earth: 2.
# Low: stable cratons, predictable elevation drift.
# High: constant reshuffling, unstable terrain, clustered event bursts.
stability = 0

# Degree to which seismic and volcanic activity concentrates along plate boundaries vs spreading diffusely across the interior.
# Range: 1–10. Earth: 7.
# Low: activity is evenly distributed across the surface.
# High: activity is tightly focused on boundary zones.
boundary_focus = 0

["seismicity"]
# How often seismic events occur at plate boundaries.
# Range: 1–10. Earth: 4.
# Low: infrequent earthquakes.
# High: near-constant seismic activity.
frequency = 0

# How severe seismic events are when they occur.
# Range: 1–10. Earth: 4.
# Low: minor tremors.
# High: civilization-scale earthquakes.
intensity = 0

# How long seismic episodes persist once triggered.
# Range: 1–10. Earth: 3.
# Low: sharp, brief events.
# High: prolonged seismic sequences and aftershock swarms.
duration = 0

["volcanism"]
# How often volcanic episodes occur.
# Range: 1–10. Earth: 2.
# Low: rare eruptions.
# High: near-constant volcanic activity.
frequency = 0

# How severe volcanic episodes are when they occur.
# Range: 1–10. Earth: 3.
# Low: minor venting.
# High: civilization-scale eruptions.
intensity = 0

# How long volcanic episodes persist once triggered.
# Range: 1–10. Earth: 2.
# Low: brief eruptions.
# High: sustained, long-duration events.
duration = 0

