# Forcing candidates
####################
# Not active parameters. Reserved for runtime forcings. Uncomment and inject as a Forcing when active mountain-building during the simulation window is required.

# How aggressively uplift builds at convergent boundaries during the forcing window.
# Low: slow, gradual rise. High: rapid, dramatic orogeny.
# Range: 1–10.
# orogeny_rate = 0

# How quickly uplift dissipates via erosion and isostatic adjustment.
# Low: permanent ranges. High: mountains flatten rapidly.
# Range: 1–10.
# orogeny_erosion = 0
