# The domain this body orbits. Defines the orbital hierarchy.
parent = ""

# Average orbital distance from parent in km.
semi_major_axis = 0.0

# Shape of the orbital ellipse.
# Range: 0–1. 0: perfectly circular. 1: maximally eccentric, parabolic limit.
eccentricity = 0.0

# Orbital tilt relative to parent's equatorial plane in degrees.
inclination = 0.0

# Sidereal orbital period in seconds.
orbital_period = 0.0

# Starting orbital angle at tick 0, in degrees. 0: reference direction.
initial_true_anomaly = 0.0
