<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mimameithr — Component Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            padding: 10px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-shrink: 0;
        }

        #header h1 {
            font-size: 15px;
            font-weight: 600;
            color: #e0e0e0;
            white-space: nowrap;
        }

        #legend {
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
        }

        .legend-box {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid #555;
            flex-shrink: 0;
        }

        .leg-solid {
            width: 24px;
            height: 2px;
            background: #888;
        }

        .leg-dash {
            width: 24px;
            height: 0;
            border-top: 2px dashed #e05555;
        }

        #toolbar {
            padding: 6px 16px;
            background: #12193a;
            border-bottom: 1px solid #0f3460;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .tb-label {
            font-size: 11px;
            color: #888;
            margin-right: 4px;
        }

        .sep {
            width: 1px;
            height: 20px;
            background: #0f3460;
            margin: 0 4px;
        }

        .ctrl-btn {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid #e94560;
            background: #0f3460;
            color: #eee;
        }

        .ctrl-btn:hover {
            background: #e94560;
        }

        #network {
            flex: 1;
            min-height: 0;
            height: 0;
        }
    </style>
</head>
<body>

<div id="header">
    <h1>Mimameithr — Component Graph</h1>
    <div id="legend"></div>
</div>

<div id="toolbar">
    <span class="tb-label">Spheres:</span>
    <div id="sphere-filters"></div>
    <div class="sep"></div>
    <button class="ctrl-btn" id="btn-fit">Fit</button>
    <button class="ctrl-btn" id="btn-physics">Freeze Layout</button>
</div>

<div id="network"></div>

<script>
    // ── Tuning ───────────────────────────────────────────────────────────────────

    const EDGE_LENGTH_INTRA = 150;  // rest length for real edges within the same sphere
    const EDGE_LENGTH_CROSS = 400;  // rest length for real edges across spheres
    const EDGE_LENGTH_COHESION = 100;  // rest length for invisible intra-sphere cohesion edges

    const PHYSICS_GRAVITY = -800;
    const PHYSICS_CENTRAL_GRAVITY = 0.01;
    const PHYSICS_SPRING_LENGTH = 200;
    const PHYSICS_SPRING_CONSTANT = 0.05;
    const PHYSICS_DAMPING = 0.9;

    const STABILIZATION_ITERATIONS = 100;

    // ── Data ────────────────────────────────────────────────────────────────────

    const SPHERES = {
        Primosphere: {bg: "#B0C4DE", border: "#5A80A8", text: "#0d1117"},
        Lithosphere: {bg: "#C4A882", border: "#7B5A2E", text: "#0d1117"},
        Atmosphere: {bg: "#80C8D8", border: "#2A8AA8", text: "#0d1117"},
        Hydrosphere: {bg: "#6AAECC", border: "#1A6A8E", text: "#0d1117"},
        Cryosphere: {bg: "#A0E0E0", border: "#409898", text: "#0d1117"},
        Biosphere: {bg: "#72CC72", border: "#2A7E2A", text: "#0d1117"},
        Anthroposphere: {bg: "#E6B800", border: "#906800", text: "#0d1117"},
    };

    const RAW_NODES = [
        {id: "Domain", label: "Domain", sphere: "Primosphere"},
        {id: "Irradiance", label: "Irradiance", sphere: "Primosphere"},
        {id: "Albedo", label: "Albedo", sphere: "Primosphere"},
        {id: "Motion", label: "Motion", sphere: "Primosphere"},
        {id: "Tectonics", label: "Tectonics", sphere: "Lithosphere"},
        {id: "Orogeny", label: "Orogeny", sphere: "Lithosphere"},
        {id: "Elevation", label: "Elevation", sphere: "Lithosphere"},
        {id: "Dynamics", label: "Dynamics", sphere: "Lithosphere"},
        {id: "Sedimentation", label: "Sedimentation", sphere: "Lithosphere"},
        {id: "Geology", label: "Geology", sphere: "Lithosphere"},
        {id: "Geothermal", label: "Geothermal", sphere: "Lithosphere"},
        {id: "ThermalRedist", label: "Thermal Redistribution", sphere: "Atmosphere"},
        {id: "Composition", label: "Composition", sphere: "Atmosphere"},
        {id: "Circulation", label: "Circulation", sphere: "Atmosphere"},
        {id: "Precipitation", label: "Precipitation", sphere: "Atmosphere"},
        {id: "Basin", label: "Basin", sphere: "Hydrosphere"},
        {id: "SeaLevel", label: "Sea Level", sphere: "Hydrosphere"},
        {id: "OceanCirculation", label: "Ocean Circulation", sphere: "Hydrosphere"},
        {id: "RiverNetwork", label: "River Network", sphere: "Hydrosphere"},
        {id: "Groundwater", label: "Groundwater", sphere: "Hydrosphere"},
        {id: "IceSheet", label: "Ice Sheet", sphere: "Cryosphere"},
        {id: "Glacier", label: "Glacier", sphere: "Cryosphere"},
        {id: "SeaIce", label: "Sea Ice", sphere: "Cryosphere"},
        {id: "Permafrost", label: "Permafrost", sphere: "Cryosphere"},
        {id: "Biome", label: "Biome", sphere: "Biosphere"},
        {id: "Flora", label: "Flora", sphere: "Biosphere"},
        {id: "Soil", label: "Soil", sphere: "Biosphere"},
        {id: "Fauna", label: "Fauna", sphere: "Biosphere"},
        {id: "Disease", label: "Disease", sphere: "Biosphere"},
        {id: "Civilization", label: "Civilization", sphere: "Anthroposphere"},
    ];

    const RAW_EDGES = [
        // Primosphere
        {from: "Domain", to: "Irradiance", label: "geometry, gravity", t: "q"},
        {from: "Motion", to: "Irradiance", label: "orbital geometry", t: "q"},
        {from: "Irradiance", to: "ThermalRedist", label: "irradiance map", t: "q"},
        {from: "Albedo", to: "ThermalRedist", label: "albedo map", t: "q"},
        // Lithosphere internal
        {from: "Tectonics", to: "Orogeny", label: "plate map, fault map", t: "q"},
        {from: "Tectonics", to: "Elevation", label: "crustal baseline", t: "q"},
        {from: "Tectonics", to: "Dynamics", label: "stress point locations", t: "q"},
        {from: "Tectonics", to: "Geology", label: "crust type", t: "q"},
        {from: "Tectonics", to: "Geothermal", label: "crust thickness", t: "q"},
        {from: "Orogeny", to: "Elevation", label: "uplift state", t: "q"},
        {from: "Orogeny", to: "Geology", label: "orogeny history", t: "q"},
        {from: "Dynamics", to: "Geothermal", label: "stress point state", t: "q"},
        // Atmosphere
        {from: "OceanCirculation", to: "ThermalRedist", label: "coastal masks", t: "q"},
        {from: "Elevation", to: "Circulation", label: "orography", t: "q"},
        {from: "ThermalRedist", to: "Circulation", label: "heat distribution", t: "q"},
        {from: "ThermalRedist", to: "Precipitation", label: "thermal gradient", t: "q"},
        {from: "Composition", to: "Circulation", label: "gas state", t: "q"},
        {from: "Circulation", to: "Precipitation", label: "moisture, wind field", t: "q"},
        // Hydrosphere
        {from: "Elevation", to: "Basin", label: "elevation field", t: "q"},
        {from: "Elevation", to: "RiverNetwork", label: "elevation field", t: "q"},
        {from: "Precipitation", to: "RiverNetwork", label: "precipitation field", t: "q"},
        {from: "Precipitation", to: "Groundwater", label: "precipitation field", t: "q"},
        {from: "SeaLevel", to: "Basin", label: "sea level", t: "q"},
        {from: "SeaLevel", to: "OceanCirculation", label: "sea level", t: "q"},
        {from: "Basin", to: "RiverNetwork", label: "basin assignment", t: "q"},
        {from: "Basin", to: "OceanCirculation", label: "basin asgmt, land/ocean mask", t: "q"},
        {from: "ThermalRedist", to: "OceanCirculation", label: "heat distribution", t: "q"},
        {from: "RiverNetwork", to: "Groundwater", label: "river flux", t: "q"},
        {from: "SeaIce", to: "OceanCirculation", label: "sea ice extent", t: "q"},
        // Cryosphere
        {from: "ThermalRedist", to: "IceSheet", label: "heat distribution", t: "q"},
        {from: "ThermalRedist", to: "Glacier", label: "heat distribution", t: "q"},
        {from: "ThermalRedist", to: "SeaIce", label: "heat distribution", t: "q"},
        {from: "ThermalRedist", to: "Permafrost", label: "heat distribution", t: "q"},
        {from: "Precipitation", to: "IceSheet", label: "precipitation field", t: "q"},
        {from: "Precipitation", to: "Glacier", label: "precipitation field", t: "q"},
        {from: "Elevation", to: "Glacier", label: "elevation field", t: "q"},
        {from: "IceSheet", to: "SeaIce", label: "ice coverage", t: "q"},
        // Biosphere
        {from: "ThermalRedist", to: "Biome", label: "heat distribution", t: "q"},
        {from: "Precipitation", to: "Biome", label: "precipitation field", t: "q"},
        {from: "Elevation", to: "Biome", label: "elevation field", t: "q"},
        {from: "OceanCirculation", to: "Biome", label: "coastal masks", t: "q"},
        {from: "Permafrost", to: "Biome", label: "permafrost extent", t: "q"},
        {from: "Biome", to: "Flora", label: "biome class", t: "q"},
        {from: "Biome", to: "Fauna", label: "biome class", t: "q"},
        {from: "Biome", to: "Soil", label: "biome class", t: "q"},
        {from: "Biome", to: "Disease", label: "habitat suitability", t: "q"},
        {from: "Soil", to: "Flora", label: "fertility, depth", t: "q"},
        {from: "Flora", to: "Soil", label: "organic matter", t: "q"},
        {from: "Sedimentation", to: "Soil", label: "sediment deposit", t: "q"},
        {from: "RiverNetwork", to: "Flora", label: "river flux", t: "q"},
        {from: "Groundwater", to: "Flora", label: "water table depth", t: "q"},
        {from: "Precipitation", to: "Flora", label: "precipitation field", t: "q"},
        {from: "Flora", to: "Fauna", label: "vegetation cover", t: "q"},
        {from: "RiverNetwork", to: "Fauna", label: "river flux", t: "q"},
        {from: "Groundwater", to: "Fauna", label: "water table depth", t: "q"},
        {from: "Fauna", to: "Disease", label: "host density", t: "q"},
        {from: "RiverNetwork", to: "Disease", label: "waterborne vector", t: "q"},
        {from: "Groundwater", to: "Disease", label: "waterborne vector", t: "q"},
        {from: "Circulation", to: "Disease", label: "airborne vector", t: "q"},
        {from: "Flora", to: "Albedo", label: "vegetation cover", t: "q"},
        {from: "Geology", to: "Soil", label: "mineral distribution", t: "q"},
        {from: "Geology", to: "Groundwater", label: "rock type", t: "q"},
        // Anthroposphere reads
        {from: "Elevation", to: "Civilization", label: "elevation field", t: "q"},
        {from: "RiverNetwork", to: "Civilization", label: "river flux", t: "q"},
        {from: "Groundwater", to: "Civilization", label: "water table depth", t: "q"},
        {from: "Soil", to: "Civilization", label: "soil state", t: "q"},
        {from: "Fauna", to: "Civilization", label: "fauna distribution", t: "q"},
        {from: "Geology", to: "Civilization", label: "resource deposits", t: "q"},
        {from: "Geothermal", to: "Civilization", label: "heat flux", t: "q"},
        {from: "Permafrost", to: "Civilization", label: "permafrost extent", t: "q"},
        // Commands
        {from: "IceSheet", to: "SeaLevel", label: "sea level msg", t: "c"},
        {from: "IceSheet", to: "Elevation", label: "erosion msg", t: "c"},
        {from: "IceSheet", to: "Albedo", label: "ice coverage msg", t: "c"},
        {from: "Glacier", to: "Elevation", label: "erosion msg", t: "c"},
        {from: "Glacier", to: "RiverNetwork", label: "melt flux msg", t: "c"},
        {from: "SeaIce", to: "Albedo", label: "sea ice coverage msg", t: "c"},
        {from: "Permafrost", to: "Composition", label: "methane msg", t: "c"},
        {from: "Geothermal", to: "Composition", label: "volcanic degassing", t: "c"},
        {from: "Disease", to: "Civilization", label: "spillover risk", t: "c"},
        {from: "Civilization", to: "Composition", label: "land use, emissions", t: "c"},
        {from: "Civilization", to: "Flora", label: "land use", t: "c"},
        {from: "Civilization", to: "SeaLevel", label: "sea level msg", t: "c"},
        {from: "Elevation", to: "Sedimentation", label: "erosion msgs", t: "c"},
    ];

    // ── Sphere lookup for edge classification ────────────────────────────────────

    const nodeSphere = {};
    RAW_NODES.forEach(n => {
        nodeSphere[n.id] = n.sphere;
    });

    // ── Build vis datasets ───────────────────────────────────────────────────────

    const nodes = new vis.DataSet(RAW_NODES.map(n => {
        const c = SPHERES[n.sphere];
        return {
            id: n.id, label: n.label, sphere: n.sphere,
            color: {background: c.bg, border: c.border, highlight: {background: c.bg, border: "#ffffff"}},
            font: {color: c.text, size: 12, face: "Helvetica"},
            shape: "box", margin: {top: 6, bottom: 6, left: 8, right: 8},
        };
    }));

    const edgeData = RAW_EDGES.map((e, i) => {
        const intra = nodeSphere[e.from] === nodeSphere[e.to];
        return {
            id: i, from: e.from, to: e.to, label: e.label,
            font: {size: 9, color: "#aaa", align: "middle", strokeWidth: 2, strokeColor: "#1a1a2e"},
            color: {color: e.t === "c" ? "#e05555" : "#777", highlight: "#ffffff", opacity: 0.85},
            dashes: e.t === "c",
            arrows: {to: {enabled: true, scaleFactor: 0.55}},
            smooth: {type: "dynamic"},
            length: intra ? EDGE_LENGTH_INTRA : EDGE_LENGTH_CROSS,
            physics: true,
        };
    });

    // ── Invisible intra-sphere cohesion edges ────────────────────────────────────
    // One edge per pair of nodes in the same sphere. No label, no arrows, hidden,
    // short rest length — gives the solver real springs to pull sphere members together.

    const sphereMembers = {};
    RAW_NODES.forEach(n => {
        if (!sphereMembers[n.sphere]) sphereMembers[n.sphere] = [];
        sphereMembers[n.sphere].push(n.id);
    });

    let cohesionId = RAW_EDGES.length;
    Object.values(sphereMembers).forEach(members => {
        for (let a = 0; a < members.length; a++) {
            for (let b = a + 1; b < members.length; b++) {
                edgeData.push({
                    id: cohesionId++,
                    from: members[a], to: members[b],
                    label: "", color: {opacity: 0},
                    arrows: {to: {enabled: false}},
                    chosen: false,
                    hoverWidth: 0,
                    selectionWidth: 0,
                    smooth: {enabled: false},
                    length: EDGE_LENGTH_COHESION,
                    physics: true,
                });
            }
        }
    });

    const edges = new vis.DataSet(edgeData);

    // ── Network ──────────────────────────────────────────────────────────────────

    const container = document.getElementById("network");
    const network = new vis.Network(container, {nodes, edges}, {
        physics: {
            enabled: true,
            solver: "forceAtlas2Based",
            forceAtlas2Based: {
                gravitationalConstant: PHYSICS_GRAVITY,
                centralGravity: PHYSICS_CENTRAL_GRAVITY,
                springLength: PHYSICS_SPRING_LENGTH,
                springConstant: PHYSICS_SPRING_CONSTANT,
                damping: PHYSICS_DAMPING,
            },
            stabilization: {iterations: STABILIZATION_ITERATIONS, updateInterval: 25},
        },
        interaction: {
            hover: true,
            zoomView: true,
            dragView: true,
            zoomSpeed: 0.3,
            tooltipDelay: 200,
        },
        layout: {improvedLayout: false},
    });

    // ── Legend ───────────────────────────────────────────────────────────────────

    const legendEl = document.getElementById("legend");
    Object.entries(SPHERES).forEach(([name, c]) => {
        legendEl.innerHTML += `<div class="legend-item"><div class="legend-box" style="background:${c.bg};border-color:${c.border}"></div>${name}</div>`;
    });
    legendEl.innerHTML += `<div class="legend-item"><div class="leg-solid"></div>Query</div>`;
    legendEl.innerHTML += `<div class="legend-item"><div class="leg-dash"></div>Command</div>`;

    // ── Sphere filter buttons ─────────────────────────────────────────────────────

    const filterEl = document.getElementById("sphere-filters");
    const activeSet = new Set(Object.keys(SPHERES));

    Object.entries(SPHERES).forEach(([name, c]) => {
        const btn = document.createElement("button");
        btn.className = "sphere-btn on";
        btn.textContent = name;
        btn.style.background = c.bg;
        btn.style.borderColor = c.border;
        btn.style.color = c.text;
        btn.onclick = () => {
            if (activeSet.has(name)) {
                activeSet.delete(name);
                btn.classList.remove("on");
                btn.style.background = "transparent";
                btn.style.color = "#888";
            } else {
                activeSet.add(name);
                btn.classList.add("on");
                btn.style.background = c.bg;
                btn.style.color = c.text;
            }
            const updates = RAW_NODES.map(n => ({id: n.id, hidden: !activeSet.has(n.sphere)}));
            nodes.update(updates);
        };
        filterEl.appendChild(btn);
    });

    // ── Controls ─────────────────────────────────────────────────────────────────

    let physicsOn = true;
    document.getElementById("btn-fit").onclick = () => network.fit({
        animation: {
            duration: 400,
            easingFunction: "easeInOutQuad"
        }
    });
    document.getElementById("btn-physics").onclick = function () {
        physicsOn = !physicsOn;
        network.setOptions({physics: {enabled: physicsOn}});
        this.textContent = physicsOn ? "Freeze Layout" : "Unfreeze Layout";
    };

    // ── Hover highlight ───────────────────────────────────────────────────────────

    network.on("hoverNode", ({node}) => {
        const connected = new Set(network.getConnectedEdges(node).filter(id => id < RAW_EDGES.length));
        edges.update(edgeData.slice(0, RAW_EDGES.length).map(e => ({
            id: e.id,
            font: {color: connected.has(e.id) ? "#ffffff" : "#333"}
        })));
    });
    network.on("blurNode", () => {
        edges.update(edgeData.slice(0, RAW_EDGES.length).map(e => ({id: e.id, font: {color: "#aaa"}})));
    });
</script>
</body>
</html>
